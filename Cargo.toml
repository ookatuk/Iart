[workspace]
resolver = "3"

members = ["iart", "iart-core", "iart-macros"]

[workspace.package]
edition = "2024"

version = "0.1.0"
authors = ["ookatu <hgfhgfojgljgjhdiopyfgiiiiiu@outlook.com>"]

description = "The Infomation and Result Trace crate"

repository = "https://github.com/ookatuk/Iart"
license = "Apache-2.0"

[workspace.dependencies]
spin = "^0.10"
iart-core = { path = "iart-core", version = "0.1.0" }
iart-macros = { path = "iart-macros", version = "0.1.0" } # versionが必須！